version: "3"
services:
  api:
    build:
       context: . 
    ports:
      - "8000:8000"
    volumes:
      - ./trade_remedies_api:/app/
    env_file:
      - local.env
    command: python manage.py runserver 0.0.0.0:8000
    environment:
      - DJANGO_SETTINGS_MODULE=trade_remedies_api.settings.local
  celery:
    build:
       context: . 
    build: .
    command: celery -A trade_remedies_api worker -l INFO
    volumes:
      - ./trade_remedies_api:/app/
    env_file:
      - local.env
    environment:
      - DJANGO_SETTINGS_MODULE=trade_remedies_api.settings.local
  postgres:
    image: postgres:10.7
    ports:
      - "5432:5432"
    volumes:
      - ./setup/init.sql:/docker-entrypoint-initdb.d/init.sql
    environment:
      POSTGRES_DB: trade_remedies
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"