version: "3"
services:
  api:
    build:
       context: . 
    ports:
      - "8000:8000"
    volumes:
      - ./:/app/
    env_file:
      - local.env
    depends_on:
      - postgres
      - redis
    command: python manage.py runserver 0.0.0.0:8000
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.local  
  celery:
    build:
       context: . 
    build: .
    command: celery -A config worker -l INFO
    volumes:
      - ./:/app/
    env_file:
      - local.env
    depends_on:
      - postgres
      - redis
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.local
  postgres:
    image: postgres:10.7
    ports:
      - "5432:5432"
    volumes:
      - ./setup/init.sql:/docker-entrypoint-initdb.d/init.sql
    environment:
      POSTGRES_DB: trade_remedies
      POSTGRES_USER: uktrade
      POSTGRES_PASSWORD: uktrade
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
